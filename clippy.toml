# The panic lints in the workspace manifest exist because a decoder must not unwind on
# hostile bytes. A test is the opposite case: it is asserting, the input is its own, and
# an unwrap there is the assertion. Denying it would push every test through a match that
# says nothing.
allow-unwrap-in-tests = true
allow-expect-in-tests = true
allow-panic-in-tests = true
allow-indexing-slicing-in-tests = true
