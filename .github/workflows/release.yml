# Publishes a tagged version to crates.io and npm, holding no long-lived credential.
#
# # It cannot run the first release, and that is a property of the registries
#
# A trusted publisher is configured on a crate or a package that already exists.
# crates.io has no equivalent of PyPI's pending publisher, and npm has none either, so
# there is nothing to attach a publisher to until a name is taken. The first version of
# the six crates and the eight packages goes out by hand with a token, the fourteen
# publishers are configured against this file, and the tokens are then revoked. Every
# release after that is this workflow. docs/release-process.md carries the sequence.
#
# Until that has happened this workflow runs and stops at the first publish, which is
# the honest failure: it says the trusted publisher is not configured, rather than
# reaching for a secret that should not exist.
#
# # Why an environment
#
# Both registries let a trusted publisher be scoped to a GitHub environment, and this
# one is scoped to `release`. With a required reviewer on that environment the OIDC
# token cannot be minted until a person approves the run, so pushing a tag is not by
# itself enough to publish. For a library whose whole claim is that it verifies rather
# than trusts, its own supply chain having a human gate is proportionate.
#
# # Order
#
# Crates go bottom up, because crates.io resolves a dependency at publish time and a
# crate whose dependency is not yet on the index does not build. tl and cell depend on
# nothing here, adnl needs tl, block needs cell and tl, lite needs adnl and tl, and the
# facade needs all of them. npm is the same shape: the platform packages are optional
# dependencies of the main one, so they exist before it names them.
name: release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

# The floor, raised per job where a job earns it. `id-token: write` is the whole
# credential story and belongs only to the two jobs that publish: it lets them ask
# GitHub for an OIDC assertion, which each registry exchanges for a token good for
# minutes. Nothing here reads a secret.
permissions:
  contents: read

# A tag is published once. A second run for the same tag would find every version
# already taken and fail halfway through proving it.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # The tag is not evidence that the tree is good; the commit it points at may never
  # have had a full run. Publishing is irreversible on crates.io, which yanks but never
  # deletes, so the gate runs again here rather than being assumed.
  gate:
    if: github.repository == 'nirapod-labs/ton-net'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2.84.0
        with:
          tool: just@1.57.0,taplo@0.10.0,typos@1.48.0
      - name: the tag matches the manifests
        run: |
          set -euo pipefail
          tagged="${GITHUB_REF_NAME#v}"
          declared=$(node -p "require('./bindings/node/package.json').version")
          if [ "$tagged" != "$declared" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match the declared version $declared"
            exit 1
          fi
          node scripts/check-versions.mjs
      - run: just gate

  crates:
    needs: gate
    runs-on: ubuntu-latest
    # Scoped to the environment the trusted publishers name. A required reviewer here
    # is what makes a tag push insufficient on its own.
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      # Exchanges this run's OIDC assertion for a crates.io token that expires in
      # about half an hour, exported as CARGO_REGISTRY_TOKEN. No secret is read and
      # none exists to leak.
      - uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
        id: auth

      # Bottom up. `--no-verify` is deliberately absent: the package is built from the
      # tarball that will be published, which is the last chance to catch a crate that
      # compiles in the workspace and not on its own.
      #
      # Nothing here sleeps between crates: since 1.66 `cargo publish` blocks until the
      # version it just uploaded is visible in the index, which is exactly the wait the
      # next crate in the list needs.
      - name: publish the crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set -euo pipefail
          for crate in ton-net-tl ton-net-cell ton-net-adnl ton-net-block ton-net-lite ton-net; do
            echo "::group::publish $crate"
            cargo publish -p "$crate"
            echo "::endgroup::"
          done

  npm:
    needs: crates
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # Trusted publishing needs node 22.14.0 and npm 11.5.1.
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest

      # Built by build-binding.yml, which fires on the same tag. Publishing what that
      # matrix produced rather than rebuilding here means the binaries that were loaded
      # and smoke tested are the binaries that ship.
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: bindings/node/artifacts
          pattern: bindings-*
          merge-multiple: true

      - name: place each binary in its platform package
        working-directory: bindings/node
        run: |
          set -euo pipefail
          npm ci
          # Rebuilds the npm/<target> directories from the napi config, then moves each
          # downloaded .node into the one that names its triple.
          npx napi create-npm-dirs
          npx napi artifacts --output-dir ./artifacts
          # Every platform package must carry exactly one binary, and the main package
          # must name every platform package it will resolve at install time. A missing
          # pair here is a published version that cannot load on the platform it claims.
          node scripts/check-package.mjs

      # The platform packages first: the main package lists them as optional
      # dependencies, and npm resolves those at install time.
      - name: publish the platform packages
        working-directory: bindings/node
        run: |
          set -euo pipefail
          for dir in npm/*/; do
            echo "::group::publish $dir"
            npm publish "$dir" --access public --provenance
            echo "::endgroup::"
          done

      - name: publish the main package
        working-directory: bindings/node
        run: npm publish --access public --provenance

  announce:
    needs: npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # The release notes are the changelog entry. Writing them twice is how the two
      # come to disagree, so the section for this version is lifted out rather than
      # composed again.
      - name: create the GitHub release from the changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" { inside = 1; next }
            inside && /^## / { exit }
            inside { print }
          ' CHANGELOG.md > notes.md
          if [ ! -s notes.md ]; then
            echo "::error::CHANGELOG.md has no section for $version"
            exit 1
          fi
          gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file notes.md
