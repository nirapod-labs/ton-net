# Builds the Node binding for every platform it publishes to.
#
# This does not publish. It produces the artifacts a release uploads and proves
# every target still compiles, which is the part that breaks quietly: a
# dependency raises its own floor, or a target loses a linker, and nothing says
# so until a release is already half done.
#
# Each target builds natively on a runner of its own architecture. Cross
# compiling works for some of these, and was measured, but it buys a slower
# toolchain rather than a faster job: napi's cross toolchain ships gcc 4.8, which
# warns on every modern rustc object it links. Native runners avoid the question.
name: build binding

on:
  # Runs on a tag so a release has its artifacts, and weekly so a target that
  # stops building is found in a quiet week rather than during a release.
  push:
    tags: ["v*"]
  schedule:
    - cron: "41 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-binding-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # A fork has no reason to spend a weekly matrix on this.
    if: github.repository == 'nirapod-labs/ton-net' || github.event_name == 'workflow_dispatch'
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
          - target: x86_64-apple-darwin
            runner: macos-14
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      # BOTH MUSL TARGETS ARE BROKEN HERE, and this is where that is recorded until
      # they are built somewhere that can build them.
      #
      # rustc names `cc` as the linker for x86_64-unknown-linux-musl and
      # `aarch64-linux-musl-gcc` for the arm64 one. On a glibc host `cc` is the glibc
      # driver, so the x64 build succeeds and produces a shared object carrying the
      # glibc interpreter: `ld-linux-x86-64.so.2`, which no musl system has. It is a
      # musl artifact in name only, and it would fail to load for everyone who
      # installed it. The musl smoke job below is what says so.
      #
      # The arm64 target fails outright, and it fails honestly: the cross wrapper it
      # asks for is a real musl linker. Supplying it via musl-tools moves the failure
      # to a `libgcc_s.so.1` its sysroot does not carry, which is what a genuine musl
      # link needs and a Debian musl sysroot does not have. Pointing arm64 at `cc`
      # instead was tried and is wrong for the reason above: it turns a loud failure
      # into a quiet wrong answer.
      #
      # The fix is to build these two where the toolchain, the libc and libgcc already
      # agree, which is an Alpine container, not to keep adjusting a glibc host.

      # Not `npm ci`. The optional dependencies name the per-platform packages,
      # and npm refuses a clean install while they have no lockfile entries,
      # which they cannot have until they are published. `npm install` skips an
      # optional dependency it cannot resolve. This becomes `npm ci` once the
      # first release puts those packages on the registry.
      - name: install
        working-directory: bindings/node
        run: npm install

      - name: build
        working-directory: bindings/node
        run: npx napi build --platform --release --target ${{ matrix.target }}

      # The loader picks a binary by filename, so a build that produced the wrong
      # one, or nothing, has to fail here rather than at somebody's install.
      #
      # Counted by globbing rather than through `wc`, because BSD `wc` pads its
      # output and GNU `wc` does not, so the string comparison this used to make
      # failed on both macOS runners against a build that had just succeeded.
      - name: artifact exists
        shell: bash
        working-directory: bindings/node
        run: |
          shopt -s nullglob
          built=(*.node)
          if [ ${#built[@]} -ne 1 ]; then
            echo "expected one .node, found ${#built[@]}"
            ls -la
            exit 1
          fi
          ls -la "${built[0]}"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binding-${{ matrix.target }}
          path: bindings/node/*.node
          if-no-files-found: error
          retention-days: 7

  # The binaries are only worth something if one of them loads and answers. This
  # runs the gate test on the artifact the matrix produced rather than on a
  # freshly built one, so what is checked is what would be published.
  smoke:
    name: the built binary works
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: binding-x86_64-unknown-linux-gnu
          path: bindings/node
      # Not `npm ci`. The optional dependencies name the per-platform packages,
      # and npm refuses a clean install while they have no lockfile entries,
      # which they cannot have until they are published. `npm install` skips an
      # optional dependency it cannot resolve. This becomes `npm ci` once the
      # first release puts those packages on the registry.
      - name: install
        working-directory: bindings/node
        run: npm install
      # Reaches a live liteserver and skips if none answers, the same way the
      # rest of the network tests do.
      - name: gate test
        working-directory: bindings/node
        run: node test.mjs

  # A musl binary that builds is not a musl binary that runs, and every other job
  # here is on glibc, so loading it anywhere else proves nothing about it. Two of
  # the seven published binaries are musl and neither had ever been loaded.
  #
  # The container is only for the load. Checkout and download stay on the host,
  # because a JavaScript action is executed by the runner's own Node, which is
  # linked against glibc and does not run inside an Alpine container.
  smoke-musl:
    name: the musl binary loads on musl
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: binding-x86_64-unknown-linux-musl
          path: bindings/node
      # The gate test imports the generated loader and nothing else, so it needs no
      # install: the loader is plain JavaScript over `fs`, and it picks the musl
      # binary here because it detects a musl libc, which is the half of the loader
      # nothing had exercised either.
      #
      # The image is a moving tag where every action above is pinned to a commit,
      # which is a deliberate exception rather than an oversight: Dependabot tracks
      # an image named in a `container:` key or a Dockerfile and not one named
      # inside a script, so a digest here would be a pin nothing updates. The trade
      # is accepted because this container is handed no token and contributes
      # nothing to a published artifact; it only loads one that already exists.
      - name: load it on alpine
        run: |
          docker run --rm \
            --volume "$PWD/bindings/node:/binding" \
            --workdir /binding \
            node:22-alpine node test.mjs
