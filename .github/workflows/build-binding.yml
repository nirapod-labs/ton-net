# Builds the Node binding for every platform it publishes to.
#
# This does not publish. It produces the artifacts a release uploads and proves
# every target still compiles, which is the part that breaks quietly: a
# dependency raises its own floor, or a target loses a linker, and nothing says
# so until a release is already half done.
#
# Each target builds natively on a runner of its own architecture. Cross
# compiling works for some of these, and was measured, but it buys a slower
# toolchain rather than a faster job: napi's cross toolchain ships gcc 4.8, which
# warns on every modern rustc object it links. Native runners avoid the question.
name: build binding

on:
  # Runs on a tag so a release has its artifacts, and weekly so a target that
  # stops building is found in a quiet week rather than during a release.
  push:
    tags: ["v*"]
  schedule:
    - cron: "41 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-binding-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # A fork has no reason to spend a weekly matrix on this.
    if: github.repository == 'nirapod-labs/ton-net' || github.event_name == 'workflow_dispatch'
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
          - target: x86_64-apple-darwin
            runner: macos-14
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      # No musl toolchain is installed on purpose. These crates pull in no C, so
      # rustc links a musl target with its own bundled libc and needs nothing from
      # the host, which is what the x64 musl build does: it never asks for one.
      #
      # The two musl targets do not agree on that by default. rustc names `cc` as the
      # linker for x86_64-unknown-linux-musl and `aarch64-linux-musl-gcc` for the
      # arm64 one, so the arm64 build looks for a cross wrapper that is not there.
      # Installing musl-tools puts one there and moves the failure rather than fixing
      # it: that wrapper links a shared object against a `libgcc_s.so.1` its sysroot
      # does not carry. Naming `cc` builds arm64 the same way x64 is already built.

      # Not `npm ci`. The optional dependencies name the per-platform packages,
      # and npm refuses a clean install while they have no lockfile entries,
      # which they cannot have until they are published. `npm install` skips an
      # optional dependency it cannot resolve. This becomes `npm ci` once the
      # first release puts those packages on the registry.
      - name: install
        working-directory: bindings/node
        run: npm install

      - name: build
        working-directory: bindings/node
        # Read only when that target is the one being built, so it is inert on the
        # other six.
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: cc
        run: npx napi build --platform --release --target ${{ matrix.target }}

      # The loader picks a binary by filename, so a build that produced the wrong
      # one, or nothing, has to fail here rather than at somebody's install.
      #
      # Counted by globbing rather than through `wc`, because BSD `wc` pads its
      # output and GNU `wc` does not, so the string comparison this used to make
      # failed on both macOS runners against a build that had just succeeded.
      - name: artifact exists
        shell: bash
        working-directory: bindings/node
        run: |
          shopt -s nullglob
          built=(*.node)
          if [ ${#built[@]} -ne 1 ]; then
            echo "expected one .node, found ${#built[@]}"
            ls -la
            exit 1
          fi
          ls -la "${built[0]}"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binding-${{ matrix.target }}
          path: bindings/node/*.node
          if-no-files-found: error
          retention-days: 7

  # The binaries are only worth something if one of them loads and answers. This
  # runs the gate test on the artifact the matrix produced rather than on a
  # freshly built one, so what is checked is what would be published.
  smoke:
    name: the built binary works
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: binding-x86_64-unknown-linux-gnu
          path: bindings/node
      # Not `npm ci`. The optional dependencies name the per-platform packages,
      # and npm refuses a clean install while they have no lockfile entries,
      # which they cannot have until they are published. `npm install` skips an
      # optional dependency it cannot resolve. This becomes `npm ci` once the
      # first release puts those packages on the registry.
      - name: install
        working-directory: bindings/node
        run: npm install
      # Reaches a live liteserver and skips if none answers, the same way the
      # rest of the network tests do.
      - name: gate test
        working-directory: bindings/node
        run: node test.mjs
