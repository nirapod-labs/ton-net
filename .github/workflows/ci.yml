name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

# Node binding and network integration tests get their own jobs as those layers
# land in the v0.1.0 plan. This gate covers the core crates.
jobs:
  check:
    name: fmt, clippy, docs, tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: format
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: docs
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps
      - name: tests
        run: cargo test

  msrv:
    name: msrv 1.82
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.82.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo build
