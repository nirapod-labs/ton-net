name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

# The Node binding gets its own job as that layer lands in the v0.1.0 plan. The
# hermetic gate covers the core crates; the network job runs the ignored tests that
# reach a live liteserver.
jobs:
  check:
    name: fmt, clippy, docs, tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: format
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: docs
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps
      - name: tests
        run: cargo test

  msrv:
    name: msrv 1.85
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo build

  network:
    name: network integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The ignored tests reach a live mainnet liteserver. Each skips if its server is
      # unreachable, so liteserver rotation does not fail the build, but a real protocol
      # regression does.
      - name: network tests
        run: cargo test -- --ignored

  node:
    name: node binding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # napi-rs 3.x needs a newer toolchain than the core floor; stable satisfies it.
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: install
        working-directory: bindings/node
        run: npm install
      - name: clippy
        run: cargo clippy -p ton-net-node --all-targets -- -D warnings
      - name: build addon
        working-directory: bindings/node
        run: npx napi build --platform
      # The gate test reaches mainnet and skips if no liteserver is reachable.
      - name: gate test
        working-directory: bindings/node
        run: node test.mjs
