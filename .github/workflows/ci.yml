name: ci

on:
  push:
    branches: [main]
  pull_request:
  # The cold-sync test walks every key block the network has published since the block
  # the config pins, which is minutes and tens of megabytes off a public liteserver. It
  # runs once a day rather than on every commit.
  schedule:
    - cron: "17 4 * * *"

env:
  CARGO_TERM_COLOR: always

# The Node binding gets its own job as that layer lands in the v0.1.0 plan. The
# hermetic gate covers the core crates; the network job runs the ignored tests that
# reach a live liteserver; the spike job covers the standalone projects the gate
# cannot see.
jobs:
  check:
    name: fmt, clippy, docs, tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: format
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: docs
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps
      - name: tests
        run: cargo test

  msrv:
    name: msrv 1.85
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo build

  network:
    name: network integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The ignored tests reach a live mainnet liteserver. Each skips if its server is
      # unreachable, so liteserver rotation does not fail the build, but a real protocol
      # regression does.
      - name: network tests
        run: cargo test -- --ignored --skip cold_sync
      # Only on the daily schedule: the full walk from the config's init block.
      - name: cold sync
        if: github.event_name == 'schedule'
        run: cargo test -- --ignored cold_sync

  node:
    name: node binding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # napi-rs 3.x needs a newer toolchain than the core floor; stable satisfies it.
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: install
        working-directory: bindings/node
        run: npm install
      - name: clippy
        run: cargo clippy -p ton-net-node --all-targets -- -D warnings
      # The binding is a workspace member but not a default one, so the hermetic job's
      # doc gate does not reach it. Without this its broken-link lint never runs, on the
      # one crate whose doc comments are copied verbatim into the published index.d.ts.
      - name: docs
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps -p ton-net-node
      - name: build addon
        working-directory: bindings/node
        run: npx napi build --platform
      # The gate test reaches mainnet and skips if no liteserver is reachable. It walks
      # the chain either way; what the schedule adds is the walk from the block the config
      # pins, which runs over every key block published since.
      - name: gate test
        if: github.event_name != 'schedule'
        working-directory: bindings/node
        run: node test.mjs
      - name: gate test with the first sync
        if: github.event_name == 'schedule'
        working-directory: bindings/node
        env:
          TON_NET_COLD_SYNC: "1"
        run: node test.mjs

  spikes:
    name: spike lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # Each spike is a standalone project with its own lockfile, excluded from the
      # workspace, so --all-targets above never reaches one. Unlinted they rot: every
      # clippy release adds lints, and the drift surfaces as a wall of unrelated
      # errors for whoever next opens the file. A spike is committed evidence, so the
      # fix is always lint-only, but it is cheaper the day the lint appears. Only fmt
      # and clippy run here; a spike has no tests and publishes no docs. The glob
      # covers a new spike without touching this file.
      - name: fmt and clippy
        run: |
          for manifest in spikes/*/Cargo.toml; do
            echo "== ${manifest%/Cargo.toml} =="
            cargo fmt --manifest-path "$manifest" --check
            cargo clippy --manifest-path "$manifest" --all-targets -- -D warnings
          done
