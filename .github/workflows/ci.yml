name: ci

on:
  push:
    branches: [main]
  pull_request:
  # Two jobs need a clock rather than a commit. The cold-sync test walks every key block
  # the network has published since the block the config pins, which is minutes and tens
  # of megabytes off a public liteserver. The advisory check has to rerun on code that
  # has not changed, because an advisory is published against a version already merged.
  schedule:
    - cron: "17 4 * * *"

env:
  CARGO_TERM_COLOR: always

# Nothing here writes anything back. Stated rather than left to the repository
# default, because the default is settable and a workflow that reads its rights off
# a setting has none of its own.
permissions:
  contents: read

# A push that lands while the previous one is still running makes the earlier
# answer irrelevant, so it is cancelled rather than raced. Not on main: a run there
# is what a merged commit is judged by.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# A fork that enables Actions inherits the daily schedule, and the work it would do
# there is a walk over public mainnet blocks that answers a question about this
# repository. Each job names the repository so the schedule runs in one place, while
# a push or a pull request from a fork still runs everything.
#
# The Node binding gets its own job as that layer lands in the v0.1.0 plan. The
# hermetic gate covers the core crates; the network job runs the ignored tests that
# reach a live liteserver; the spike job covers the standalone projects the gate
# cannot see.
jobs:
  conventions:
    name: license headers and workflow pins
    if: github.event_name != 'schedule' || github.repository == 'nirapod-labs/ton-net'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      # Every file carries a copyright holder and a license identifier, in its own
      # header where the format allows a comment and in REUSE.toml where it does not.
      # A convention this wide decays without a check, so this one fails the build.
      - uses: fsfe/reuse-action@bb774aa972c2a89ff34781233d275075cbddf542 # v5
      # A third-party action runs with this job's token, so a moved tag is somebody
      # else's code arriving here without a commit. The same check covers the two
      # settings that stay invisible until they matter: what a workflow may write, and
      # whether a fork's schedule spends runners answering a question about this
      # repository.
      - name: workflows pinned and scoped
        run: node scripts/check-workflows.mjs

  check:
    name: fmt, clippy, docs, tests
    if: github.event_name != 'schedule' || github.repository == 'nirapod-labs/ton-net'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: format
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: docs
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps
      - name: tests
        run: cargo test

  mutants:
    name: would a test notice a missing check
    # Slow, and it answers a question that does not change between two commits on the
    # same day, so it runs on the daily schedule rather than on every push.
    if: github.event_name == 'schedule' && github.repository == 'nirapod-labs/ton-net'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2.84.0
        with:
          tool: cargo-mutants
      # Removes one check at a time and reruns the suite. A passing suite says the code
      # does what the tests ask; this says whether the tests would notice if it stopped.
      # That is the question worth asking about a library whose job is refusing things.
      # Mutants judged unkillable rather than untested are excluded in
      # .cargo/mutants.toml, each with the reason.
      - name: cell and proof crates
        run: cargo mutants -p ton-net-cell -p ton-net-block --timeout 120
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: mutants
          path: mutants.out/
          retention-days: 14

  deny:
    name: advisories, licenses, duplicates, sources
    if: github.event_name != 'schedule' || github.repository == 'nirapod-labs/ton-net'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2.84.0
        with:
          tool: cargo-deny
      # Also on the daily schedule, and that is the half most projects leave out: an
      # advisory is published against a version that merged weeks ago, so a check that
      # only runs on a diff never sees it. Every rule and its exceptions are in
      # deny.toml, including why the crypto stack sits at two generations.
      - name: dependency tree
        run: cargo deny check

  wasm:
    name: the core still builds for the browser
    if: github.event_name != 'schedule' || github.repository == 'nirapod-labs/ton-net'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # The browser binding is a later milestone, and by then the decision that
      # matters is already made: whether the protocol logic stayed free of the
      # runtime. These three crates are the sans-I/O core and must build with no
      # threads, no sockets and no clock. The transport layers above them pull in
      # tokio and are expected to fail here until the browser transport lands.
      - name: core crates on wasm32
        run: cargo build --target wasm32-unknown-unknown -p ton-net-tl -p ton-net-cell -p ton-net-block

  release-ready:
    name: versions and packaging
    if: github.event_name != 'schedule' || github.repository == 'nirapod-labs/ton-net'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # One library version across two registries. release-plz moves the Cargo
      # side and napi moves the npm side, neither reads the other, so without this
      # they drift and two artifacts claim to be the same library at different
      # numbers.
      - name: one version everywhere
        run: node scripts/check-versions.mjs
      # What crates.io would accept, including the metadata it requires and the
      # files each package would carry. Cargo resolves the inter-crate
      # dependencies through a temporary local registry, so this runs before the
      # first crate is published rather than only after.
      - name: crates would publish
        run: cargo publish --dry-run --workspace

  msrv:
    name: msrv 1.85 core, 1.88 binding
    if: github.event_name != 'schedule' || github.repository == 'nirapod-labs/ton-net'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: 1.85.0
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: 1.88.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # rust-toolchain.toml selects stable for any command that does not name a
      # toolchain, including here, so the floor is passed explicitly. Without the
      # +version this job would build on stable and report the floor as met.
      - name: core floor
        run: cargo +1.85.0 build
      # napi-rs 3 raises the binding above the core floor, and nothing checked it
      # until now, so the manifest could claim a floor no build had ever tried.
      - name: binding floor
        run: cargo +1.88.0 build -p ton-net-node

  network:
    name: network integration
    if: github.event_name != 'schedule' || github.repository == 'nirapod-labs/ton-net'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # The ignored tests reach a live mainnet liteserver. Each skips if its server is
      # unreachable, so liteserver rotation does not fail the build, but a real protocol
      # regression does.
      - name: network tests
        run: cargo test -- --ignored --skip cold_sync
      # Only on the daily schedule: the full walk from the config's init block.
      - name: cold sync
        if: github.event_name == 'schedule'
        run: cargo test -- --ignored cold_sync

  node:
    name: node binding
    if: github.event_name != 'schedule' || github.repository == 'nirapod-labs/ton-net'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      # napi-rs 3.x needs a newer toolchain than the core floor; stable satisfies it.
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - name: install
        working-directory: bindings/node
        run: npm install
      - name: clippy
        run: cargo clippy -p ton-net-node --all-targets -- -D warnings
      # The binding is a workspace member but not a default one, so the hermetic job's
      # doc gate does not reach it. Without this its broken-link lint never runs, on the
      # one crate whose doc comments are copied verbatim into the published index.d.ts.
      - name: docs
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps -p ton-net-node
      - name: build addon
        working-directory: bindings/node
        run: npx napi build --platform
      # The loader and the type definitions are generated from the Rust binding and
      # tracked, because the definitions are the published JavaScript API and the doc
      # comments a caller reads in an editor. Regenerating them here and refusing a
      # diff is what keeps the committed surface the one that actually ships.
      - name: generated surface is current
        working-directory: bindings/node
        run: git diff --exit-code -- index.js index.d.ts
      # An npm package cannot be replaced once published, only deprecated, so a
      # tarball missing its license or shipping the Rust sources is permanent.
      - name: packages are publishable
        working-directory: bindings/node
        run: npm run check-package
      # The gate test reaches mainnet and skips if no liteserver is reachable. It walks
      # the chain either way; what the schedule adds is the walk from the block the config
      # pins, which runs over every key block published since.
      - name: gate test
        if: github.event_name != 'schedule'
        working-directory: bindings/node
        run: node test.mjs
      - name: gate test with the first sync
        if: github.event_name == 'schedule'
        working-directory: bindings/node
        env:
          TON_NET_COLD_SYNC: "1"
        run: node test.mjs

  spikes:
    name: spike lint
    if: github.event_name != 'schedule' || github.repository == 'nirapod-labs/ton-net'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # Each spike is a standalone project with its own lockfile, excluded from the
      # workspace, so --all-targets above never reaches one. Unlinted they rot: every
      # clippy release adds lints, and the drift surfaces as a wall of unrelated
      # errors for whoever next opens the file. A spike is committed evidence, so the
      # fix is always lint-only, but it is cheaper the day the lint appears. Only fmt
      # and clippy run here; a spike has no tests and publishes no docs. The glob
      # covers a new spike without touching this file.
      - name: fmt and clippy
        run: |
          for manifest in spikes/*/Cargo.toml; do
            echo "== ${manifest%/Cargo.toml} =="
            cargo fmt --manifest-path "$manifest" --check
            cargo clippy --manifest-path "$manifest" --all-targets -- -D warnings
          done
