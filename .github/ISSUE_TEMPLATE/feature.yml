name: Feature request
description: Something the library should do and does not.
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: >-
        The scope is fixed in
        [NET-ADR-003](https://github.com/nirapod-labs/ton-net/blob/main/docs/adr/NET-ADR-003-scope.md)
        and the order in [the roadmap](https://github.com/nirapod-labs/ton-net/blob/main/docs/roadmap.md).
        Worth checking both first: several things that look missing are scheduled,
        and a few are deliberately out of scope.

  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: >-
        What cannot be done today, and what it is being done for. A problem
        attracts better solutions than a solution does.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: What it might look like
      description: An API sketch, or the shape of the answer, if there is one in mind.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: What is being done instead today
      description: The workaround, if any, and where it falls short.
    validations:
      required: false
