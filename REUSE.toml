version = 1
SPDX-PackageName = "ton-net"
SPDX-PackageSupplier = "Nirapod Labs"
SPDX-PackageDownloadLocation = "https://github.com/nirapod-labs/ton-net"

# Source files carry their own SPDX header. What is declared here is everything a
# header cannot reach: formats with no comment syntax, generated files, and data
# captured from the network rather than written here.

[[annotations]]
path = [
    ".gitignore",
    ".mailmap",
    "CONTRIBUTING.md",
    "LICENSE",
    "NOTICE",
    "README.md",
    "docs/**",
    "bindings/node/package.json",
    "spikes/*/README.md",
    "spikes/sync-feasibility/.gitignore",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Nirapod Labs"
SPDX-License-Identifier = "Apache-2.0"

# Lockfiles are resolved from the manifests in this repository by the toolchain,
# so they are this project's output even though nobody typed them.
[[annotations]]
path = ["Cargo.lock", "bindings/node/package-lock.json", "spikes/*/Cargo.lock"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Nirapod Labs"
SPDX-License-Identifier = "Apache-2.0"

# Test fixtures are blocks, proofs and account states captured from TON mainnet:
# bytes the validators produced and a liteserver served. What is licensed here is
# the corpus as assembled, which block to keep and how it is laid out, and not the
# network data inside it. Facts carry no copyright and none is claimed over them.
[[annotations]]
path = ["crates/*/tests/fixtures/**"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Nirapod Labs"
SPDX-License-Identifier = "Apache-2.0"

# The mainnet network configuration comes from the TON Foundation unchanged, so it
# is the one file here that is somebody else's. It is held under its own identifier
# rather than swept into the project license.
[[annotations]]
path = ["crates/ton-net/src/mainnet.config.json"]
precedence = "aggregate"
SPDX-FileCopyrightText = "NONE"
SPDX-License-Identifier = "LicenseRef-TON-network-config"
